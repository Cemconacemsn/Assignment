# Browser
browser=chrome
headless=false
auto.open.base.url=false

# Timeouts (seconds)
implicit.wait.seconds=0
explicit.wait.seconds=15
page.load.timeout.seconds=30
script.timeout.seconds=30

# UI
base.url=https://insiderone.com/
screenshot.on.failure=true

# API
# Petstore user CRUD: https://petstore.swagger.io/v2
api.base.uri=https://petstore.swagger.io/v2
# JSONPlaceholder örnekleri için: https://jsonplaceholder.typicode.com
api.log.all=false
api.auth.token=
